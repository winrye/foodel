<!--
  This is a complete, self-contained HTML file for your first web page.
  It uses Tailwind CSS for styling, which is loaded via a CDN link.
  The design is modern and responsive, looking great on both desktop and mobile devices.
  Feel free to change the text, colors, and layout to make it your own!
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
    <!-- Tailwind CSS CDN for easy styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <!-- Main content container, centered and responsive -->
    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl max-w-2xl w-full text-center">

        <!-- Page Header -->
        <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4">
            Welcome to My First Page!
        </h1>
        
        <!-- Subtitle or main message -->
        <p class="text-base md:text-lg text-gray-600 mb-8">
            This is a simple template to help you get started. You can edit this text
            and add more sections to build your own website.
        </p>

        <!-- Call-to-action button with a modern look -->
        <button id="cta-button" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-full transition-colors duration-300 transform hover:scale-105 shadow-lg">
            Click Me!
        </button>

        <!-- Message box to display content dynamically -->
        <div id="message-box" class="mt-8 p-4 bg-blue-50 text-blue-800 rounded-xl shadow-inner hidden">
            <!-- This is where our JavaScript will add a message -->
        </div>

    </div>

    <!-- Simple JavaScript for interactivity -->
    <script>
        // Get the button and the message box elements
        const ctaButton = document.getElementById('cta-button');
        const messageBox = document.getElementById('message-box');

        // Add an event listener to the button
        ctaButton.addEventListener('click', () => {
            // Get the current date and time
            const now = new Date();
            const message = `Button clicked at: ${now.toLocaleTimeString()} on ${now.toLocaleDateString()}`;
            
            // Update the message box with the new text and make it visible
            messageBox.textContent = message;
            messageBox.classList.remove('hidden');
        });
    </script>
</body>
</html>
